# Impostazioni globali del sistema.

email:
  destinatario: lorenzodainelli08@gmail.com
  # In avvio Resend consente l'invio dal mittente di onboarding SOLO verso
  # l'email con cui ti sei registrato. Dopo aver verificato un tuo dominio,
  # cambia 'mittente' con un indirizzo del tuo dominio.
  mittente: "Monitor Titoli <onboarding@resend.dev>"

# Soglia di rilevanza globale (0-100): sotto questa, la notizia non entra nel
# report. Le soglie per-titolo in portfolio.yaml hanno la precedenza.
soglia_rilevanza_globale: 50

# Soglia per gli EVENT-CHECK (routine leggere intraday): inviano un avviso
# immediato solo per eventi critici con rilevanza >= questa soglia.
soglia_evento_critico: 70

# Numero massimo di notizie nel report giornaliero (le piu' rilevanti). Se i
# candidati sopra soglia sono meno, ne mostra meno (non riempie a forza).
max_notizie_email: 10

fuso_orario: Europe/Rome

# normale | vacanza  (in 'vacanza' passano solo gli eventi critici)
modalita: normale

# A regime: 'false' = invia solo quando c'è qualcosa sopra soglia (report) o di
# critico (event-check). Weekly/monthly inviano sempre (heartbeat). Rimetti 'true'
# solo se devi ri-testare l'invio end-to-end.
test_mode: false
